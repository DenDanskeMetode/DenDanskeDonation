name: Deploy to VM (Docker Compose)

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/dendanskedonation/server:latest

      - name: Build and push client
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/dendanskedonation/client:latest

      - name: Build and push db
        uses: docker/build-push-action@v5
        with:
          context: ./dbServer
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/dendanskedonation/db:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add VM to known_hosts
        run: ssh-keyscan -H ${{ secrets.VM_IPV4 }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        timeout-minutes: 5
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -T ${{ secrets.VM_USERNAME }}@${{ secrets.VM_IPV4 }} \
            "set -e && \
             echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USER' --password-stdin && \
             cd /opt/DenDanskeDonation && \
             git pull origin main && \
             docker-compose pull && \
             docker-compose up -d --no-build"
