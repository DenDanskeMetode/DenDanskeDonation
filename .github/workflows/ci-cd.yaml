name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        run: |
          echo ":I am jelqing it so hard rn"
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        run: |
          echo ":gooning..."
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        run: |
          echo ":im cumming lois"
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: ghcr.io/dendanskemetode/dendanskedonation/server:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build client image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          load: true
          tags: ghcr.io/dendanskemetode/dendanskedonation/client:latest
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

      - name: Build db image
        uses: docker/build-push-action@v5
        with:
          context: ./dbServer
          load: true
          tags: ghcr.io/dendanskemetode/dendanskedonation/db:latest
          cache-from: type=gha,scope=db
          cache-to: type=gha,mode=max,scope=db

      - name: Install container-structure-test
        run: |
          curl -LO https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64
          chmod +x container-structure-test-linux-amd64
          sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test

      - name: Run backend structure tests
        run: |
          container-structure-test test \
            --image ghcr.io/dendanskemetode/dendanskedonation/server:latest \
            --config tests/docker/backend.structure-test.yaml

      - name: Run frontend structure tests
        run: |
          container-structure-test test \
            --image ghcr.io/dendanskemetode/dendanskedonation/client:latest \
            --config tests/docker/frontend.structure-test.yaml

      - name: Run database structure tests
        run: |
          container-structure-test test \
            --image ghcr.io/dendanskemetode/dendanskedonation/db:latest \
            --config tests/docker/database.structure-test.yaml

      - name: Run backend Jest tests
        run: |
          cd backend
          npm ci
          cd ../tests
          npm ci
          npm test

      - name: Run frontend Jest tests
        run: |
          cd frontend
          npm install --legacy-peer-deps
          npm test -- --watchAll=false --passWithNoTests
        continue-on-error: true

      - name: Create .env file
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          echo "STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}" > .env
          echo "JWT_SECRET=${JWT_SECRET}" >> .env

      - name: Start containers
        run: docker compose up -d

      - name: Healthcheck backend
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:5000 && exit 0
            echo "Attempt $i failed, retrying in 2s..."
            sleep 2
          done
          echo "Backend did not become healthy in time"
          docker compose logs
          exit 1

      - name: Validate database schema
        run: |
          set -e
          echo "=== Validating database schema ===" && \

          echo "Checking required tables..." && \
          docker compose exec -T db psql -U giraf -d mydatabase -c "\dt" | grep -E "(users|campaigns|images|donations|campaign_images)" && \
          echo "✓ All required tables exist" && \

          echo "Validating users table structure..." && \
          docker compose exec -T db psql -U giraf -d mydatabase -c "\d users" | grep -q "id" && \
          echo "✓ users table OK" && \

          echo "Validating campaigns table structure..." && \
          docker compose exec -T db psql -U giraf -d mydatabase -c "\d campaigns" | grep -q "id" && \
          echo "✓ campaigns table OK" && \

          echo "Validating donations table structure..." && \
          docker compose exec -T db psql -U giraf -d mydatabase -c "\d donations" | grep -q "id" && \
          echo "✓ donations table OK" && \

          echo "Checking test data insertion..." && \
          docker compose exec -T db psql -U giraf -d mydatabase -c "SELECT COUNT(*) as users FROM users WHERE id > 0;" && \
          docker compose exec -T db psql -U giraf -d mydatabase -c "SELECT COUNT(*) as campaigns FROM campaigns WHERE id > 0;" && \
          echo "✓ Test data verified" && \

          echo "✓ Database validation completed successfully"

#     - name: Run Jest tests
#        run: |
#          cd frontend
#          npm install
#          npm test -- --watchAll=false

# Read images from ghcr, build containers and push to client registry, then deploy to VM
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/dendanskemetode/dendanskedonation/server:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build and push client
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/dendanskemetode/dendanskedonation/client:latest
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

      - name: Build and push db
        uses: docker/build-push-action@v5
        with:
          context: ./dbServer
          push: true
          tags: ghcr.io/dendanskemetode/dendanskedonation/db:latest
          cache-from: type=gha,scope=db
          cache-to: type=gha,mode=max,scope=db

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add VM to known_hosts
        run: ssh-keyscan -H ${{ secrets.VM_IPV4 }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        timeout-minutes: 5
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -T ${{ secrets.VM_USERNAME }}@${{ secrets.VM_IPV4 }} \
            "set -e && \
             echo '=== Logging in to GitHub Container Registry ===' && \
             echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USER' --password-stdin && \
             echo '=== Navigating to deployment directory ===' && \
             cd /opt/DenDanskeDonation && \
             echo '=== Pulling latest code from main ===' && \
             git pull origin main && \
             echo '=== Creating .env file ===' && \
             echo 'STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY' > .env && \
             echo 'JWT_SECRET=$JWT_SECRET' >> .env && \
             echo '=== Pulling latest Docker images ===' && \
             docker-compose pull && \
             echo '=== Stopping old containers ===' && \
             docker-compose down && \
             echo '=== Starting new containers ===' && \
             docker-compose up -d --no-build && \
             echo '=== Verifying containers are running ===' && \
             sleep 3 && \
             docker-compose ps || { echo 'ERROR: Containers failed to start'; docker-compose logs; exit 1; } && \
             echo '=== Checking backend health ===' && \
             for i in \$(seq 1 10); do \
               curl -sf http://localhost:5000 && { echo 'Backend is healthy'; exit 0; } || echo \"Attempt \$i: backend not ready yet...\"; \
               [ \$i -lt 10 ] && sleep 2; \
             done && \
             echo 'ERROR: Backend failed to become healthy after deployment' && \
             docker-compose logs && \
             exit 1"
