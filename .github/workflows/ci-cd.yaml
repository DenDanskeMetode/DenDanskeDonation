name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: ghcr.io/dendanskemetode/dendanskedonation/server:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build client image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          load: true
          tags: ghcr.io/dendanskemetode/dendanskedonation/client:latest
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

      - name: Build db image
        uses: docker/build-push-action@v5
        with:
          context: ./dbServer
          load: true
          tags: ghcr.io/dendanskemetode/dendanskedonation/db:latest
          cache-from: type=gha,scope=db
          cache-to: type=gha,mode=max,scope=db

      - name: Install container-structure-test
        run: |
          curl -LO https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64
          chmod +x container-structure-test-linux-amd64
          sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test

      - name: Run backend structure tests
        run: |
          container-structure-test test \
            --image ghcr.io/dendanskemetode/dendanskedonation/server:latest \
            --config tests/docker/backend.structure-test.yaml

      - name: Run frontend structure tests
        run: |
          container-structure-test test \
            --image ghcr.io/dendanskemetode/dendanskedonation/client:latest \
            --config tests/docker/frontend.structure-test.yaml

      - name: Run database structure tests
        run: |
          container-structure-test test \
            --image ghcr.io/dendanskemetode/dendanskedonation/db:latest \
            --config tests/docker/database.structure-test.yaml

      - name: Start containers
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: docker compose up -d

      - name: Healthcheck backend
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:5000 && exit 0
            echo "Attempt $i failed, retrying in 2s..."
            sleep 2
          done
          echo "Backend did not become healthy in time"
          docker compose logs
          exit 1

      - name: Run Jest tests
        run: |
          cd frontend
          npm install
          npm test -- --watchAll=false

# Build and deploy to VM (CD)         
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/dendanskemetode/dendanskedonation/server:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build and push client
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/dendanskemetode/dendanskedonation/client:latest
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

      - name: Build and push db
        uses: docker/build-push-action@v5
        with:
          context: ./dbServer
          push: true
          tags: ghcr.io/dendanskemetode/dendanskedonation/db:latest
          cache-from: type=gha,scope=db
          cache-to: type=gha,mode=max,scope=db

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add VM to known_hosts
        run: ssh-keyscan -H ${{ secrets.VM_IPV4 }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        timeout-minutes: 5
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -T ${{ secrets.VM_USERNAME }}@${{ secrets.VM_IPV4 }} \
            "set -e && \
             echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USER' --password-stdin && \
             cd /opt/DenDanskeDonation && \
             git pull origin main && \
             docker-compose pull && \
             docker-compose down && \
             docker-compose up -d --no-build"
