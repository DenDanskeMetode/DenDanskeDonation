services:
  server:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  client:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - server

  services:
    db:
      build: .
      container_name: postgres_db

      environment:
        POSTGRES_USER: myuser
        POSTGRES_PASSWORD: mypassword
        POSTGRES_DB: mydatabase

      volumes:
        - postgres_data:/var/lib/postgresql/data

  volumes:
    postgres_data:
