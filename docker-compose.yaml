services:
  server:
    image: ghcr.io/dendanskemetode/dendanskedonation/server:latest
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - POSTGRES_USER=giraf
      - POSTGRES_PASSWORD=bearattack
      - POSTGRES_DB=mydatabase
    depends_on:
      - db
    command: npm start

  client:
    image: ghcr.io/dendanskemetode/dendanskedonation/client:latest
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - server

  db:
    image: ghcr.io/dendanskemetode/dendanskedonation/db:latest
    build: ./dbServer
    container_name: postgres_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: giraf
      POSTGRES_PASSWORD: bearattack
      POSTGRES_DB: mydatabase
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
